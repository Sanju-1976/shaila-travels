<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shaila Travels</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      line-height: 1.6;
    }

    header {
      background: #0a3d62;
      color: white;
      padding: 15px 0;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      background: #1e3799;
      padding: 10px;
    }

    nav a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    nav a:hover {
      color: #f6b93b;
    }

    .hero {
      height: 80vh;
      background: url('hero-bg.png') no-repeat center/cover;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      text-align: center;
    }

    .hero h1 {
      font-size: 3.5rem;
      padding: 20px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
      background: rgba(0,0,0,0.4);
      border-radius: 10px;
    }

    section {
      padding: 40px;
      text-align: center;
    }

    .destinations {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 10px;
      overflow: hidden;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .card h3 {
      padding: 10px;
    }

    button {
      padding: 10px 20px;
      background: #38ada9;
      color: white;
      border: none;
      cursor: pointer;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    button:hover {
      background: #079992;
    }

    .contact input, .contact textarea {
      width: 80%;
      padding: 10px;
      margin: 10px 0;
    }

    footer {
      background: #0a3d62;
      color: white;
      text-align: center;
      padding: 15px;
    }
  </style>
</head>

<body>

  <header>
    <h1>Shaila Travels ✈️</h1>
    <p>Your journey begins here</p>
  </header>

  <nav>
    <a href="#">Home</a>
    <a href="#destinations">Destinations</a>
    <a href="#contact">Contact</a>
  </nav>

  <div class="hero">
    <h1>Don't just dream it. Travel it.</h1>
  </div>

  <section id="destinations">
    <h2>Popular Destinations</h2>
    <div class="destinations">
      <div class="card">
        <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?auto=format&fit=crop&w=800&q=80">
        <h3>Paris</h3>
        <button onclick="bookTrip('Paris')">Book Now</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1514282401047-d79a71a590e8?auto=format&fit=crop&w=800&q=80">
        <h3>Maldives</h3>
        <button onclick="bookTrip('Maldives')">Book Now</button>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=800&q=80">
        <h3>Dubai</h3>
        <button onclick="bookTrip('Dubai')">Book Now</button>
      </div>
    </div>
  </section>

  <section id="contact" class="contact">
    <h2>Contact Us</h2>
    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea placeholder="Your Message"></textarea><br>
    <button onclick="submitForm()">Send Message</button>
  </section>

  <footer>
    <p>© 2026 Shaila Travels | All Rights Reserved</p>
  </footer>

  <script>
    function bookTrip(destination) {
      alert("You selected " + destination + "! Our agent will contact you soon.");
    }

    function submitForm() {
      alert("Thank you! Your message has been sent.");
    }
  </script>

</body>
</html>
